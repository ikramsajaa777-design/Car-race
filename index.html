<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Car Racing Game (Android Ready)</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; touch-action:none; }
canvas { display:block; }
#ui {
  position:absolute; top:10px; left:10px; color:white; font-family:sans-serif;
  background:rgba(0,0,0,0.5); padding:10px; border-radius:8px;
}
#controls {
  position:absolute; bottom:20px; width:100%; text-align:center;
}
.btn {
  width:60px; height:60px; margin:10px;
  border-radius:50%; border:none;
  background:rgba(255,255,255,0.5);
  font-size:20px;
}
</style>
</head>
<body>
<div id="ui">Touch Controls Enabled</div>
<div id="controls">
  <button class="btn" id="left">⬅️</button>
  <button class="btn" id="up">⬆️</button>
  <button class="btn" id="down">⬇️</button>
  <button class="btn" id="right">➡️</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
<script>
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xaaaaaa, 10, 200);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Lights
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,0.6));

// Road
let road = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 200),
  new THREE.MeshStandardMaterial({color:0x555555})
);
road.rotation.x = -Math.PI/2;
scene.add(road);

// Center line
let centerLine = new THREE.Mesh(
  new THREE.PlaneGeometry(0.2, 200),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
centerLine.rotation.x = -Math.PI/2;
centerLine.position.y = 0.01;
scene.add(centerLine);

// Edge stripes
function stripe(x,color){
  let s = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5,200),
    new THREE.MeshBasicMaterial({color})
  );
  s.rotation.x = -Math.PI/2;
  s.position.set(x,0.02,0);
  scene.add(s);
}
stripe(-5,0xff0000);
stripe(-4.5,0xffffff);
stripe(5,0xff0000);
stripe(4.5,0xffffff);

// Buildings
for(let i=0;i<50;i++){
  let h = Math.random()*10+5;
  let b = new THREE.Mesh(
    new THREE.BoxGeometry(3,h,3),
    new THREE.MeshStandardMaterial({color:Math.random()*0xffffff})
  );
  b.position.set(-10,h/2,-i*5);
  scene.add(b);
  let b2 = b.clone(); b2.position.x = 10;
  scene.add(b2);
}

// Street lights
for(let i=0;i<30;i++){
  let pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1,0.1,5),
    new THREE.MeshStandardMaterial({color:0x888888})
  );
  pole.position.set(-6,2.5,-i*10);
  scene.add(pole);
}

// Car
let car;
new THREE.GLTFLoader().load(
  'https://threejs.org/examples/models/gltf/ferrari.glb',
  (gltf)=>{
    car = gltf.scene;
    car.scale.set(0.5,0.5,0.5);
    car.position.set(0,0.2,5);
    scene.add(car);
  }
);

camera.position.set(0,5,10);

// Controls
let input = {up:false,down:false,left:false,right:false};

function bind(id,key){
  let btn = document.getElementById(id);
  btn.addEventListener('touchstart', ()=>input[key]=true);
  btn.addEventListener('touchend', ()=>input[key]=false);
}
bind('up','up');
bind('down','down');
bind('left','left');
bind('right','right');

// Also support keyboard
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowUp') input.up=true;
  if(e.key==='ArrowDown') input.down=true;
  if(e.key==='ArrowLeft') input.left=true;
  if(e.key==='ArrowRight') input.right=true;
});
window.addEventListener('keyup', e=>{
  if(e.key==='ArrowUp') input.up=false;
  if(e.key==='ArrowDown') input.down=false;
  if(e.key==='ArrowLeft') input.left=false;
  if(e.key==='ArrowRight') input.right=false;
});

function update(){
  if(!car) return;

  if(input.up) car.position.z -= 0.5;
  if(input.down) car.position.z += 0.5;
  if(input.left) car.position.x -= 0.3;
  if(input.right) car.position.x += 0.3
  camera.position.z = car.position.z + 10;
  camera.lookAt(car.position);
}

function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</bo
